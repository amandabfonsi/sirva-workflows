let OWNERS_EXTRA={};
const OWNERS=new Proxy({},{
  get(t,k){return DEFAULT_OWNERS[k]||OWNERS_EXTRA[k]||DEFAULT_OWNERS.rh_mobilidade;},
  ownKeys(){return[...Object.keys(DEFAULT_OWNERS),...Object.keys(OWNERS_EXTRA)];},
  has(t,k){return k in DEFAULT_OWNERS||k in OWNERS_EXTRA;},
  getOwnPropertyDescriptor(t,k){return{enumerable:true,configurable:true};},
});
function getAllOwners(){return{...DEFAULT_OWNERS,...OWNERS_EXTRA};}
function addOwner(key,label,color,bg,dot){OWNERS_EXTRA[key]={label,color,bg,dot};}

   EMAILJS CONFIG
   Setup: emailjs.com → create account → Email Templates
   Fill in your IDs below after setup
═══════════════════════════════════════════════════════ */
const EMAILJS_CFG = {
  serviceId:  localStorage.getItem("ejs_service")  || "",
  templateId: localStorage.getItem("ejs_template") || "",
  publicKey:  localStorage.getItem("ejs_key")      || "",
};
function emailjsConfigured(){
  return EMAILJS_CFG.serviceId && EMAILJS_CFG.templateId && EMAILJS_CFG.publicKey;
}

/* ── Check for late steps across all workflows ─────── */
function getLateSteps(workflows){
  const today = new Date();
  today.setHours(0,0,0,0);
  const late = [];
  workflows.forEach(wf => {
    wf.steps.forEach(step => {
      if(step.status !== "completed" && step.end_date){
        const deadline = new Date(step.end_date + "T00:00:00");
        if(deadline < today){
          const daysLate = Math.floor((today - deadline) / 86400000);
          late.push({ wf, step, daysLate });
        }
      }
    });
  });
  return late;
}

/* ── Send notification email ───────────────────────── */
async function sendLateEmail(consultantEmail, consultantName, lateItems){
  if(!emailjsConfigured()) return;
  if(!consultantEmail) return;

  const lines = lateItems.map(({wf, step, daysLate}) =>
    `• ${step.title} — ${wf.client} / ${wf.expat_name || "—"} (${daysLate} dia${daysLate>1?"s":""} de atraso)`
  ).join("\n");

  const params = {
    to_email:   consultantEmail,
    to_name:    consultantName || consultantEmail,
    late_count: lateItems.length,
    late_list:  lines,
    app_url:    window.location.href,
    date:       new Date().toLocaleDateString("pt-BR"),
  };

  try {
    window.emailjs.init(EMAILJS_CFG.publicKey);
    await window.emailjs.send(EMAILJS_CFG.serviceId, EMAILJS_CFG.templateId, params);
  } catch(e) {
    console.warn("EmailJS error:", e);
  }
}

/* ── Track last notification date ─────────────────── */
function getLastNotifDate(email){ return localStorage.getItem("notif_"+email) || ""; }
function setLastNotifDate(email){ localStorage.setItem("notif_"+email, new Date().toISOString().split("T")[0]); }
function shouldNotifyToday(email){
  return getLastNotifDate(email) !== new Date().toISOString().split("T")[0];
}

const SHEETDB="https://sheetdb.io/api/v1/50v7j5etdmnst";

async function sbGet(sheet){
  const r=await fetch(`${SHEETDB}?sheet=${sheet}`);
  if(r.status===404)return [];
  if(!r.ok)throw new Error("SheetDB "+r.status);
  const d=await r.json();
  return Array.isArray(d)?d:[];
}
async function sbPost(sheet,data){
  const r=await fetch(`${SHEETDB}?sheet=${sheet}`,{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({data:Array.isArray(data)?data:[data]})});
  if(!r.ok)throw new Error("SheetDB "+r.status);
  return r.json();
}
async function sbPatch(sheet,col,val,data){
  const r=await fetch(`${SHEETDB}/${encodeURIComponent(col)}/${encodeURIComponent(val)}?sheet=${sheet}`,
    {method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({data})});
  if(!r.ok)throw new Error("SheetDB "+r.status);
  return r.json();
}
async function sbDelete(sheet,col,val){
  const r=await fetch(`${SHEETDB}/${encodeURIComponent(col)}/${encodeURIComponent(val)}?sheet=${sheet}`,
    {method:"DELETE"});
  if(!r.ok)throw new Error("SheetDB "+r.status);
  return r.json();
}

const newId=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const nowISO=()=>new Date().toISOString();
const fd=d=>{
  if(!d)return"—";
  const[y,m,day]=d.split("-");
  return`${parseInt(day)} ${["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"][m-1]} ${y}`;
};

   DATA LAYER
═══════════════════════════════════════════════════════ */
async function loadData(userEmail,userRole,clientId){
  const[wfRows,stRows]=await Promise.all([sbGet("workflows"),sbGet("steps")]);
  let filtered=wfRows||[];
  // External users ONLY see their assigned workflow
  if(userRole==="external"){
    if(!clientId){return [];} // no client assigned = no access
    filtered=filtered.filter(w=>w.id===clientId||w.client_id===clientId);
  }
  return filtered.map(wf=>({
    id:wf.id,service:wf.service||"",client:wf.client||"",
    expat_name:wf.expat_name||"",hr_name:wf.hr_name||"",
    consultant:wf.consultant||"",contact_email:wf.contact_email||"",
    start_date:wf.start_date||"",extra_weeks:parseInt(wf.extra_weeks)||0,
    uploaded_image:wf.uploaded_image||"",
    flow_type:wf.flow_type||"relocation",
    accompanied:wf.accompanied||"no",
    steps:(stRows||[])
      .filter(s=>s.workflow_id===wf.id)
      .sort((a,b)=>parseInt(a.sort_order||0)-parseInt(b.sort_order||0))
      .map(s=>({
        id:s.id,workflow_id:s.workflow_id,sort_order:parseInt(s.sort_order)||0,
        icon_id:s.icon_id||"briefcase",title:s.title||"",description:s.description||"",
        owner_type:s.owner_type||"sirva",responsible:s.responsible||"",role:s.role||"",
        start_date:s.start_date||"",end_date:s.end_date||"",status:s.status||"pending",
        tags:s.tags?s.tags.split(",").map(t=>t.trim()).filter(Boolean):[],
        flow_type:s.flow_type||"relocation",
      }))
  }));
}

async function saveWorkflow(wf,userEmail){
  const ts=nowISO();
  const existing=await sbGet("workflows");
  const exists=(existing||[]).some(r=>r.id===wf.id);
  const row={id:wf.id,service:wf.service,client:wf.client,expat_name:wf.expat_name||"",flow_type:wf.flow_type||"relocation",accompanied:wf.accompanied||"no",
    hr_name:wf.hr_name||"",consultant:wf.consultant,contact_email:wf.contact_email,
    start_date:wf.start_date||"",extra_weeks:wf.extra_weeks||0,
    uploaded_image:wf.uploaded_image||"",
    flow_type:wf.flow_type||"relocation",
    accompanied:wf.accompanied||"no",updated_at:ts};
  if(exists) await sbPatch("workflows","id",wf.id,row);
  else await sbPost("workflows",{...row,created_at:ts});
  const stRows=await sbGet("steps");
  const old=(stRows||[]).filter(s=>s.workflow_id===wf.id);
  for(const s of old) await sbDelete("steps","id",s.id);
  for(let i=0;i<wf.steps.length;i++){
    const s=wf.steps[i];
    await sbPost("steps",{id:s.id,workflow_id:wf.id,sort_order:i,icon_id:s.icon_id,
      title:s.title,description:s.description||"",owner_type:s.owner_type,
      responsible:s.responsible,role:s.role||"",start_date:s.start_date||"",
      end_date:s.end_date||"",status:s.status,tags:(s.tags||[]).join(","),
      created_at:ts,updated_at:ts});
  }
  await sbPost("audit_log",{id:newId(),workflow_id:wf.id,action:"saved",
    field:"",old_value:"",new_value:`Cliente: ${wf.client}`,changed_by:userEmail,changed_at:ts});
}

async function loadUsers(){
  try{return await sbGet("app_users");}
  catch(e){return [];}
}
async function saveUser(user){
  const all=await loadUsers();
  const exists=(all||[]).some(u=>u.email===user.email);
  if(exists)await sbPatch("app_users","email",user.email,user);
  else await sbPost("app_users",{...user,created_at:nowISO()});
}
async function deleteUser(email){await sbDelete("app_users","email",email);}

═══════════════════════════════════════════════════════ */
let firebaseApp=null,fbAuth=null;

async function initFirebase(cfg){
  if(firebaseApp)return true;
  await Promise.all([
    loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"),
    loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"),
  ]);
  firebaseApp=window.firebase.initializeApp(cfg);
  fbAuth=window.firebase.auth();
  return true;
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement("script");
    s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

async function signInEmail(email,password){
  const result=await fbAuth.signInWithEmailAndPassword(email,password);
  return result.user;
}

async function signOut(){
  if(fbAuth)await fbAuth.signOut();
}

async function sendPasswordReset(email){
  await fbAuth.sendPasswordResetEmail(email);
}

/* ═══════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════ */
function LoginScreen({onLogin,lang,setLang}){
  const t=T[lang];
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const IS={fontFamily:"Manrope",fontSize:13,background:"rgba(255,255,255,0.07)",
    border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"11px 14px",
    outline:"none",width:"100%",boxSizing:"border-box",color:"#fff"};

  // Detect role hint from email
  const isSirva=email.toLowerCase().endsWith("@sirva.com");
  const roleHint=isSirva?"Acesso interno — Sirva":"Acesso externo";

  const submit=async()=>{
    if(!email||!pass){setErr("Preencha e-mail e senha.");return;}
    setLoading(true);setErr("");
    try{
      const fbUser=await signInEmail(email,pass);
      const users=await loadUsers();
      const found=(users||[]).find(u=>u.email.toLowerCase()===fbUser.email.toLowerCase());
      if(!found){
        // First @sirva.com user becomes admin automatically
        if(fbUser.email.toLowerCase().endsWith("@sirva.com")){
          const u={email:fbUser.email,name:fbUser.email.split("@")[0],
            role:"admin",client_id:"",active:"true"};
          await saveUser(u);
          onLogin(fbUser,u);
        } else {
          await signOut();
          setErr("Acesso não autorizado. Solicite ao administrador Sirva.");
        }
      } else if(found.active==="false"){
        await signOut();
        setErr("Conta desativada. Contate o administrador.");
      } else {
        onLogin(fbUser,found);
      }
    }catch(e){
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"){
        setErr("E-mail ou senha incorretos.");

/* ═══════════════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════════════ */
async function doExport(type,wf,t){
  if(type==="csv"){
    const rows=[["Etapa","Responsável","Tipo","Início","Prazo","Status","Tags"],
      ...wf.steps.map(s=>[s.title,s.responsible,(getAllOwners()[s.owner_type]||DEFAULT_OWNERS.sirva_imigracao).label,
        s.start_date,s.end_date,(STATUS_CFG[s.status]?"":s.status),(s.tags||[]).join("; ")])];
    const hdr=[["Sirva Workflows"],["Serviço:",wf.service],["Cliente:",wf.client],
      ["Expatriado:",wf.expat_name||""],["RH:",wf.hr_name||""],["Consultor:",wf.consultant],[]];
    const csv=[...hdr,...rows].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`sirva-${(wf.client||"wf").replace(/\s+/g,"_")}.csv`;a.click();
  }
  if(type==="pdf"){
    // Load libraries
    if(!window.html2canvas){
      await new Promise((res,rej)=>{const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    if(!window.jspdf){
      await new Promise((res,rej)=>{const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const el=document.getElementById("gantt-export");
    if(!el){alert("Abra a Timeline Semanal antes de exportar.");return;}
    const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#FAF8FC",
      scrollX:0,scrollY:0,windowWidth:el.scrollWidth,width:el.scrollWidth});
    const imgData=canvas.toDataURL("image/jpeg",0.95);
    const{jsPDF}=window.jspdf;
    // Landscape A4
    const pdf=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
    const pW=pdf.internal.pageSize.getWidth();
    const pH=pdf.internal.pageSize.getHeight();
    const ratio=canvas.width/canvas.height;
    let iW=pW,iH=pW/ratio;
    if(iH>pH){iH=pH;iW=pH*ratio;}
    const xOff=(pW-iW)/2,yOff=(pH-iH)/2;
    pdf.addImage(imgData,"JPEG",xOff,yOff,iW,iH);
    // Second page: step list
    pdf.addPage();
    pdf.setFillColor(13,4,53);
    pdf.rect(0,0,pW,18,"F");
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(14);pdf.setFont("helvetica","bold");
    pdf.text("Sirva — "+wf.client+" — "+wf.expat_name,10,12);
    let y=26;
    pdf.setFontSize(9);
    wf.steps.forEach((step,i)=>{
      if(y>pH-10){pdf.addPage();y=16;}
      const st=step.status==="completed"?"✓ ":step.status==="in_progress"?"▶ ":"○ ";
      pdf.setTextColor(21,7,80);pdf.setFont("helvetica","bold");
      pdf.text(st+(i+1)+". "+step.title,10,y);
      pdf.setFont("helvetica","normal");pdf.setTextColor(92,74,122);
      pdf.text((step.responsible||"")+" | "+(step.start_date||"?")+" → "+(step.end_date||"?"),14,y+5);
      y+=12;
    });
    pdf.setTextColor(155,136,181);pdf.setFontSize(8);
    pdf.text("Sirva Relocation — My Timelines — gerado em "+new Date().toLocaleDateString("pt-BR"),10,pH-6);
    pdf.save(`sirva-${(wf.client||"wf").replace(/\s+/g,"_")}-${(wf.expat_name||"timeline").replace(/\s+/g,"_")}.pdf`);
  }
  if(type==="image"){
    if(!window.html2canvas){
      await new Promise((res,rej)=>{const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const el=document.getElementById("gantt-export");
    if(!el)return;
    const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#FAF8FC"});
    const a=document.createElement("a");a.download="sirva-timeline.png";
    a.href=canvas.toDataURL("image/png");a.click();
  }
}

function ExportModal({wf,onClose,t}){
  const[loading,setLoading]=useState("");
  const run=async type=>{

  };
  const opts=[

  );
}

function AdminPanel({workflows,onClose,t}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[form,setForm]=useState({email:"",name:"",role:"internal",client_id:"",password:""});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState("");

  useEffect(()=>{
    loadUsers().then(u=>{setUsers(u||[]);setLoading(false);});
  },[]);

  const addUser=async()=>{
    if(!form.email)return;
    setSaving(true);
    try{
      if(form.role==="external"&&form.password){
        // Create Firebase email/password user
        // Note: can only be done via Admin SDK in production
        // For now, we save to sheet and inform admin to set password in Firebase console
      }
      await saveUser({email:form.email,name:form.name,role:form.role,
        client_id:form.client_id||"",active:"true"});
      try{
        await sendPasswordReset(form.email);
        setMsg("✓ Usuário adicionado! E-mail para definir senha enviado para "+form.email+".");
      }catch(e){
        setMsg("✓ Usuário salvo. Crie a senha em Firebase Console → Authentication → Users para: "+form.email);
      }
      const updated=await loadUsers();setUsers(updated||[]);
      setForm({email:"",name:"",role:"internal",client_id:"",password:""});
    }catch(e){setMsg("Erro: "+e.message);}
    setSaving(false);
  };

  const removeUser=async email=>{
    if(!confirm("Remover "+email+"?"))return;
    await deleteUser(email);
    setUsers(u=>u.filter(x=>x.email!==email));
  };

  const IS={fontFamily:"Manrope",fontSize:12,color:S.text,background:S.g50,
    border:`1.5px solid ${S.g200}`,borderRadius:7,padding:"7px 10px",outline:"none",width:"100%",boxSizing:"border-box"};
  const roleColor={admin:S.accent,internal:S.primary,external:"#065f46"};
  const roleBg={admin:S.light,internal:"#F3EAF9",external:"#d1fae5"};

            padding:"6px 12px",cursor:"pointer",fontFamily:"Manrope",fontSize:13,color:S.sub,fontWeight:700}}>✕</button>
        </div>

        {/* Add user form */}
        <div style={{background:S.g50,borderRadius:14,padding:"16px",marginBottom:20,border:`1px solid ${S.g200}`}}>
          <div style={{fontFamily:"Manrope",fontSize:12,fontWeight:800,color:S.text,marginBottom:6}}>{t.adminAddUser}</div>
        <div style={{fontFamily:"Manrope",fontSize:11,color:S.sub,marginBottom:12,
          background:"#F0FDFA",border:"1px solid #99f6e4",borderRadius:8,padding:"8px 12px",lineHeight:1.6}}>
          ℹ️ Ao adicionar, o usuário recebe automaticamente um e-mail para definir sua própria senha.

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            <div><label style={{fontFamily:"Manrope",fontSize:9,color:S.g400,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,display:"block"}}>{t.adminEmail}</label>
              <input style={IS} value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@empresa.com"/></div>
            <div><label style={{fontFamily:"Manrope",fontSize:9,color:S.g400,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,display:"block"}}>Nome</label>

            <div><label style={{fontFamily:"Manrope",fontSize:9,color:S.g400,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,display:"block"}}>{t.adminRole}</label>
              <select style={IS} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                <option value="admin">{t.roleAdmin}</option>

            {form.role==="external"&&(

            ✕

        <div style={{maxHeight:"60vh",overflowY:"auto",padding:"12px"}}>

            return(
              <div key={step.id} style={{display:"flex",gap:12,padding:"12px",
                background:i%2===0?S.g50:S.white,borderRadius:10,marginBottom:6,
                border:`1px solid ${S.g200}`}}>
                <div style={{width:4,borderRadius:2,background:oc.bar,flexShrink:0}}/>

                  <div style={{fontFamily:"Manrope",fontSize:12,fontWeight:800,color:S.text,

                    {step.title}
                  </div>
                  <div style={{fontFamily:"Manrope",fontSize:11,color:S.sub,marginBottom:4}}>
                    {wf.client} — {wf.expat_name||"—"}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontFamily:"Manrope",fontSize:10,fontWeight:700,
                      color:"#b91c1c",background:"#fef2f2",padding:"2px 8px",borderRadius:99}}>
                      🕐 {daysLate} dia{daysLate>1?"s":""} de atraso
                    </span>
                    <span style={{fontFamily:"Manrope",fontSize:10,color:S.g400}}>
                      Prazo: {step.end_date}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        {/* Footer */}
        <div style={{padding:"14px 16px",borderTop:`1px solid ${S.g100}`,
          display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <div style={{fontFamily:"Manrope",fontSize:11,color:S.g400,lineHeight:1.5}}>
            E-mail de alerta enviado ao consultor responsável.
          </div>
          <button onClick={onClose}
            style={{background:S.dark,color:"#fff",border:"none",borderRadius:8,
              padding:"8px 16px",fontFamily:"Manrope",fontSize:12,fontWeight:700,cursor:"pointer",
              whiteSpace:"nowrap"}}>
            Entendi
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── EmailJS Setup Modal ─────────────────────────────── */
function EmailJsSetup({onClose, onSave}){
  const[cfg,setCfg]=useState({
    serviceId: EMAILJS_CFG.serviceId,
    templateId: EMAILJS_CFG.templateId,
    publicKey: EMAILJS_CFG.publicKey,
  });
  const IS={fontFamily:"Manrope",fontSize:13,color:S.text,background:S.g50,
    border:`1.5px solid ${S.g200}`,borderRadius:8,padding:"9px 12px",
    outline:"none",width:"100%",boxSizing:"border-box"};
  const save=()=>{
    localStorage.setItem("ejs_service", cfg.serviceId);
    localStorage.setItem("ejs_template", cfg.templateId);
    localStorage.setItem("ejs_key", cfg.publicKey);
    EMAILJS_CFG.serviceId=cfg.serviceId;
    EMAILJS_CFG.templateId=cfg.templateId;
    EMAILJS_CFG.publicKey=cfg.publicKey;
    onSave();
    onClose();
  };
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(13,4,53,0.75)",zIndex:500,
        display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:S.white,borderRadius:20,padding:"26px 30px",
        width:"min(460px,95vw)",boxShadow:"0 24px 80px rgba(13,4,53,0.4)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontFamily:"Manrope",fontSize:15,fontWeight:800,color:S.text}}>📧 Configurar E-mail (EmailJS)</div>
          <button onClick={onClose} style={{border:"none",background:S.g100,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"Manrope",fontSize:13,color:S.sub,fontWeight:700}}>✕</button>
        </div>
        <div style={{background:S.g50,borderRadius:10,padding:"10px 14px",marginBottom:16,
          fontFamily:"Manrope",fontSize:11,color:S.sub,lineHeight:1.8}}>
          1. Acesse <strong>emailjs.com</strong> → crie conta grátis<br/>
          2. <strong>Email Services</strong> → conecte seu Gmail/Outlook<br/>
          3. <strong>Email Templates</strong> → crie template com variáveis:<br/>
          <code style={{background:S.g200,padding:"1px 4px",borderRadius:4,fontSize:10}}>
            {"{{to_name}}"} {"{{late_count}}"} {"{{late_list}}"} {"{{date}}"}
          </code><br/>
          4. Cole os IDs abaixo
        </div>
        {[["Service ID","serviceId","service_xxxxxxx"],
          ["Template ID","templateId","template_xxxxxxx"],
          ["Public Key","publicKey","xxxxxxxxxxxx"]].map(([label,key,ph])=>(
          <div key={key} style={{marginBottom:12}}>
            <label style={{fontFamily:"Manrope",fontSize:9,color:S.g400,fontWeight:700,
              textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4,display:"block"}}>{label}</label>
            <input style={IS} value={cfg[key]} onChange={e=>setCfg({...cfg,[key]:e.target.value})} placeholder={ph}/>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={onClose} style={{flex:1,border:`1.5px solid ${S.g200}`,background:S.white,borderRadius:9,padding:"9px",cursor:"pointer",fontFamily:"Manrope",fontSize:12,fontWeight:700,color:S.sub}}>Cancelar</button>
          <button onClick={save} style={{flex:2,background:`linear-gradient(135deg,${S.accent},${S.accentDark})`,color:"#fff",border:"none",borderRadius:9,padding:"9px",fontFamily:"Manrope",fontSize:12,fontWeight:800,cursor:"pointer"}}>Salvar configuração</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   GANTT VIEW
═══════════════════════════════════════════════════════ */
function GanttView({wf,onUpdate,onSave,saving,saveMsg,t,canEdit,flowFilter,setFlowFilter,flowFilters}){
  const[editMode,setEditMode]=useState(false);
  const[tooltip,setTooltip]=useState(null);
  const[showExport,setShowExport]=useState(false);

  // Filter steps by flow type
  const allSteps=wf.steps;
  const steps=flowFilter==="all"?allSteps:allSteps.filter(s=>(s.flow_type||"relocation")===flowFilter);
  // Use allSteps for week range so timeline width stays consistent
  let maxW=0;
  allSteps.forEach(s=>{
    if(s.end_date&&wf.start_date){
      const w=Math.max(1,Math.floor((new Date(s.end_date+"T00:00:00")-new Date(wf.start_date+"T00:00:00"))/(86400000*7))+1);
      if(w>maxW)maxW=w;
    }
  });
  const totalWeeks=Math.max(maxW+1,12)+(wf.extra_weeks||0);
  const weeks=Array.from({length:totalWeeks},(_,i)=>i+1);
  const CW=44,RH=62,LW=240;
  const todayW=wf.start_date?Math.max(1,Math.ceil((new Date()-new Date(wf.start_date+"T00:00:00"))/(7*86400000))):0;

  const setStep=(i,s)=>{const a=[...wf.steps];a[i]=s;onUpdate({...wf,steps:a});};

  const IS={fontFamily:"Manrope",fontSize:11,color:S.text,background:"rgba(243,234,249,0.8)",
    border:`1px solid ${S.mid}`,borderRadius:5,padding:"3px 7px",outline:"none",width:"100%",boxSizing:"border-box"};

  const done=steps.filter(s=>s.status==="completed").length;
  const inp=steps.filter(s=>s.status==="in_progress").length;
  const pct=steps.length>0?Math.round(((done+inp*0.5)/steps.length)*100):0;

  return(
    <div style={{padding:"20px",flex:1,overflow:"auto"}}>
      {showExport&&<ExportModal wf={wf} onClose={()=>setShowExport(false)} t={t}/>}

      <div id="gantt-export">
        {/* Header */}
        <div style={{background:S.dark,borderRadius:20,padding:"24px 32px",marginBottom:18,
          position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,
            borderRadius:"50%",background:S.primary,opacity:0.4}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
              <LogoW h={28}/><div style={{width:1,height:20,background:"rgba(255,255,255,0.2)"}}/>
              <span style={{fontFamily:"Manrope",fontSize:11,color:"rgba(255,255,255,0.4)",
                letterSpacing:"0.1em",textTransform:"uppercase"}}>{t.gantt}</span>
              {!canEdit&&(
                <span style={{fontFamily:"Manrope",fontSize:10,fontWeight:700,
                  color:"rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.06)",
                  padding:"2px 8px",borderRadius:99,marginLeft:4}}>
                  👁 Visualização
                </span>
              )}
            </div>
            <h1 style={{fontFamily:"Manrope",fontSize:17,fontWeight:800,color:"#fff",
              margin:"0 0 12px",lineHeight:1.3}}>{wf.service}</h1>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"7px 16px",marginBottom:14}}>
              {[["👤 "+t.expat,wf.expat_name||"—"],["🏢 "+t.hr,wf.hr_name||"—"],
                ["🤝 "+t.consultant,wf.consultant||"—"],["🏷 "+t.client,wf.client||"—"],
                ["📅 "+t.startDate,wf.start_date?fd(wf.start_date):"—"]].map(([k,v])=>(
                <div key={k}>
                  <div style={{fontFamily:"Manrope",fontSize:9,color:"rgba(255,255,255,0.4)",
                    textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>{k}</div>
                  <div style={{fontFamily:"Manrope",fontSize:11,color:"#fff",fontWeight:600}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontFamily:"Manrope",fontSize:11,color:"rgba(255,255,255,0.4)"}}>
                {done} / {steps.length}</span>
              <span style={{fontFamily:"Manrope",fontSize:15,fontWeight:800,color:S.accent}}>{pct}%</span>
            </div>
            <div style={{background:"rgba(255,255,255,0.1)",borderRadius:99,height:5,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,background:S.accent,
                width:`${pct}%`,transition:"width 0.8s"}}/>
            </div>
          </div>
        </div>

        {/* Uploaded image */}
        {wf.uploaded_image&&(
          <div style={{marginBottom:14,borderRadius:14,overflow:"hidden",
            border:`1px solid ${S.g200}`,maxHeight:320}}>
            <img src={wf.uploaded_image} alt="Timeline" style={{width:"100%",objectFit:"contain",display:"block"}}/>
          </div>
        )}

        {/* Flow type filter tabs */}
        {flowFilters&&(
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {flowFilters.map(f=>{
              const count=f.id==="all"
                ?allSteps.length
                :allSteps.filter(s=>(s.flow_type||"relocation")===f.id).length;
              const active=flowFilter===f.id;
              return(
                <button key={f.id} onClick={()=>setFlowFilter(f.id)}
                  style={{border:`1.5px solid ${active?S.accent:S.g200}`,
                    background:active?S.light:"transparent",
                    color:active?S.primary:S.g400,
                    borderRadius:99,padding:"6px 16px",cursor:"pointer",
                    fontFamily:"Manrope",fontSize:12,fontWeight:700,
                    display:"flex",alignItems:"center",gap:6,
                    transition:"all 0.15s",
                    boxShadow:active?`0 2px 8px ${S.accent}33`:"none"}}>
                  {f.label}
                  <span style={{fontFamily:"Manrope",fontSize:10,fontWeight:800,
                    color:active?S.accent:S.g400,
                    background:active?"rgba(166,77,214,0.12)":"rgba(0,0,0,0.06)",
                    borderRadius:99,padding:"1px 6px"}}>
                    {count}
                  </span>
                </button>
              );
            })}
          </div>
        )}

        {/* Controls */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          flexWrap:"wrap",gap:10,marginBottom:12}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(getAllOwners()).map(([k,v])=>{
              const oc2=ownerColor(k);
              return(
                <span key={k} style={{display:"inline-flex",alignItems:"center",gap:6,
                  background:oc2.light,borderRadius:99,padding:"4px 12px",
                  fontFamily:"Manrope",fontSize:10,fontWeight:700,color:oc2.text,
                  border:`1px solid ${oc2.bar}22`}}>
                  <span style={{width:10,height:10,borderRadius:3,background:oc2.bar,flexShrink:0}}/>
                  {v.label}
                </span>
              );
            })}
          </div>
          <div style={{display:"flex",gap:7}}>
            <div style={{display:"flex",gap:4}}>
            <button onClick={()=>onUpdate({...wf,extra_weeks:Math.max(0,(wf.extra_weeks||0)-4)})}
              style={{background:S.light,border:`1.5px solid ${S.mid}`,borderRadius:99,
                padding:"5px 10px",cursor:"pointer",fontFamily:"Manrope",fontSize:11,
                fontWeight:700,color:S.primary}}>− 4</button>
            <button onClick={()=>onUpdate({...wf,extra_weeks:(wf.extra_weeks||0)+4})}
              style={{background:S.light,border:`1.5px solid ${S.mid}`,borderRadius:99,
                padding:"5px 10px",cursor:"pointer",fontFamily:"Manrope",fontSize:11,
                fontWeight:700,color:S.primary}}>{t.addWeeks}</button>
          </div>
            {canEdit&&(
              <button onClick={()=>setEditMode(!editMode)}
                style={{background:editMode?S.accent:S.light,
                  border:`1.5px solid ${editMode?S.accent:S.mid}`,
                  borderRadius:99,padding:"5px 14px",cursor:"pointer",fontFamily:"Manrope",
                  fontSize:11,fontWeight:700,color:editMode?"#fff":S.primary}}>
                {editMode?t.doneEdit:t.editSteps}
              </button>
            )}
          </div>
        </div>

        {/* Gantt grid */}
        <div style={{overflowX:"auto"}}>
          <div style={{minWidth:LW+totalWeeks*CW+20,background:S.white,borderRadius:16,
            border:`1px solid ${S.g200}`,padding:"10px 0 6px",
            boxShadow:"0 2px 12px rgba(13,4,53,0.06)"}}>
            <div style={{display:"flex",paddingLeft:LW}}>
              {weeks.map(w=>(
                <div key={w} style={{width:CW,flexShrink:0,textAlign:"center",
                  fontFamily:"Manrope",fontSize:10,fontWeight:w===todayW?800:600,
                  color:w===todayW?S.accent:S.g400,paddingBottom:5}}>
                  {("W"+(w<10?"0"+w:w))}
                </div>
              ))}
            </div>
            <div style={{position:"relative"}}>
              {todayW>=1&&todayW<=totalWeeks&&(
                <div style={{position:"absolute",top:0,bottom:0,zIndex:5,pointerEvents:"none",
                  left:LW+(todayW-1)*CW+CW/2,width:2,background:"rgba(239,68,68,0.5)",borderRadius:2}}>
                  <div style={{position:"absolute",top:-15,left:"50%",transform:"translateX(-50%)",
                    background:"#ef4444",color:"#fff",fontSize:9,fontFamily:"Manrope",fontWeight:700,
                    padding:"1px 5px",borderRadius:3,whiteSpace:"nowrap"}}>{t.today}</div>
                </div>
              )}
              {steps.map((step,i)=>{
                const ow=getAllOwners()[step.owner_type]||DEFAULT_OWNERS.sirva_imigracao;
                const oc=ownerColor(step.owner_type);
                const base=wf.start_date?new Date(wf.start_date+"T00:00:00"):new Date();
                const wS=step.start_date?Math.max(1,Math.floor((new Date(step.start_date+"T00:00:00")-base)/(86400000*7))+1):1;
                const wE=step.end_date?Math.max(wS,Math.floor((new Date(step.end_date+"T00:00:00")-base)/(86400000*7))+1):wS+1;
                const span=Math.max(wE-wS+1,1);
                const late=step.status!=="completed"&&step.end_date&&new Date(step.end_date+"T00:00:00")<new Date();
                const bc=late?"#ef4444":oc.bar,bb=late?"rgba(239,68,68,0.08)":oc.light;
                return(
                  <div key={step.id} style={{display:"flex",alignItems:"center",height:editMode?72:RH,
                    borderBottom:i<steps.length-1?`1px solid ${S.g100}`:"none",
                    position:"relative",paddingLeft:10,
                    background:editMode&&i%2===0?"rgba(243,234,249,0.25)":"transparent"}}>
                    {/* Label */}
                    <div style={{width:LW-10,flexShrink:0,paddingRight:8}}>
                      {editMode?(
                        <div style={{display:"flex",flexDirection:"column",gap:3}}>
                          <input style={IS} value={step.title}
                            onChange={e=>setStep(i,{...step,title:e.target.value})}/>
                          <div style={{display:"flex",gap:3}}>
                            <input type="date" style={{...IS,fontSize:10}} value={step.start_date}
                              onChange={e=>setStep(i,{...step,start_date:e.target.value})}/>
                            <input type="date" style={{...IS,fontSize:10}} value={step.end_date}
                              onChange={e=>setStep(i,{...step,end_date:e.target.value})}/>
                            <select style={{...IS,fontSize:10,width:110}} value={step.status}
                              onChange={e=>setStep(i,{...step,status:e.target.value})}>
                              <option value="pending">{t.pending}</option>
                              <option value="in_progress">{t.inProgress}</option>
                              <option value="completed">{t.completed}</option>
                            </select>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          {/* Colored left strip instead of dot */}
                          <div style={{width:4,height:36,borderRadius:2,
                            background:bc,flexShrink:0}}/>
                          <div style={{minWidth:0}}>
                            <div style={{fontFamily:"Manrope",fontSize:11,fontWeight:700,color:S.text,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{step.title}</div>
                            <div style={{display:"flex",gap:4,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                              <span style={{fontFamily:"Manrope",fontSize:9,fontWeight:700,
                                color:oc.text,background:oc.light,
                                padding:"1px 6px",borderRadius:99,display:"inline-block",
                                maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                {ow.label}
                              </span>
                              {/* Status badge */}
                              <span style={{fontFamily:"Manrope",fontSize:8,fontWeight:700,
                                color:step.status==="completed"?"#059669":step.status==="in_progress"?"#D97706":"#9B88B5",
                                background:step.status==="completed"?"#d1fae5":step.status==="in_progress"?"#fef3c7":"#F0EBF6",
                                padding:"1px 5px",borderRadius:99,display:"inline-flex",alignItems:"center",gap:2,whiteSpace:"nowrap"}}>
                                {step.status==="completed"?"✓":step.status==="in_progress"?"▶":"○"}
                                {" "}{step.status==="completed"?t.completed:step.status==="in_progress"?t.inProgress:t.pending}
                              </span>
                              {step.flow_type&&step.flow_type!=="relocation"&&(
                                <span style={{fontFamily:"Manrope",fontSize:8,fontWeight:700,
                                  color:{immigration:"#7C3AED",moving:"#0D9488",general:"#475569"}[step.flow_type]||"#9B88B5",
                                  background:{immigration:"#F5F3FF",moving:"#F0FDFA",general:"#F1F5F9"}[step.flow_type]||"#F0EBF6",
                                  padding:"1px 5px",borderRadius:99,display:"inline-block",whiteSpace:"nowrap"}}>
                                  {step.flow_type}
                                </span>
                              )}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                    {/* Grid cells */}
                    {weeks.map(w=>(<div key={w} style={{width:CW,height:"100%",flexShrink:0,
                      background:w%2===0?"rgba(240,235,246,0.3)":"transparent"}}/>))}
                    {/* Bar */}
                    {!editMode&&(
                      <div onMouseEnter={e=>setTooltip({step,x:e.clientX,y:e.clientY})}
                        onMouseLeave={()=>setTooltip(null)}
                        style={{position:"absolute",left:LW+(wS-1)*CW+3,width:span*CW-6,height:30,
                          borderRadius:7,background:step.status==="completed"?bc:step.status==="in_progress"?bc+"bb":bc+"44",
                          border:`1.5px solid ${bc}`,display:"flex",alignItems:"center",paddingLeft:7,
                          cursor:"pointer",overflow:"hidden",
                          boxShadow:step.status==="in_progress"?`0 0 0 2px ${bc}33`:"none"}}>
                        {step.status==="completed"&&<span style={{fontSize:9,color:"#fff",fontWeight:800,marginRight:3}}>✓</span>}
                        <span style={{fontFamily:"Manrope",fontSize:10,fontWeight:700,
                          color:step.status==="pending"?bc+"cc":"#fff",
                          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {span>=3?step.title:""}
                        </span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Action bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
        marginTop:14,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"Manrope",fontSize:12,color:S.sub}}>
          {wf.contact_email&&<>Contato: <a href={`mailto:${wf.contact_email}`}
            style={{color:S.primary,fontWeight:700,textDecoration:"none"}}>{wf.contact_email}</a></>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowExport(true)}
            style={{background:S.light,border:`1.5px solid ${S.mid}`,borderRadius:9,
              padding:"8px 16px",fontFamily:"Manrope",fontSize:12,fontWeight:700,
              cursor:"pointer",color:S.primary}}>⬇ {t.export}</button>
          {canEdit&&(
            <button onClick={onSave} disabled={saving}
              style={{background:saveMsg?S.green:`linear-gradient(135deg,${S.accent},${S.accentDark})`,
                color:"#fff",border:"none",borderRadius:9,padding:"8px 16px",

/* ═══════════════════════════════════════════════════════
   STEP TRANSLATION via Claude API
═══════════════════════════════════════════════════════ */
async function translateText(text, targetLang){
  if(!text||!text.trim())return text;
  const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error("Translate error "+r.status);
  const data=await r.json();
  return data[0].map(x=>x[0]).join("");
}

async function translateSteps(steps, targetLang){
  const fields=["title","description","role","responsible"];
  const translated=[];
  for(const step of steps){
    const s={...step};
    for(const f of fields){
      if(s[f]&&s[f].trim()){
        try{ s[f]=await translateText(s[f],targetLang); }
        catch(e){ console.warn("translate field",f,e); }
      }
    }
    translated.push(s);
  }
  return translated;
}

function EditorView({wf,onUpdate,onSave,saving,saveMsg,t,lang}){

  const[localWf,setLocalWf]=useState(wf);

    // Only re-sync when switching to a different workflow, not on every prop change
    if(wf.id!==wfIdRef.current){
      wfIdRef.current=wf.id;
      setLocalWf(wf);
    }
  },[wf.id]);
  const siLocal=(f,v)=>setLocalWf(s=>({...s,[f]:v}));
  const siFlush=(f,v)=>{const updated={...localWf,[f]:v};setLocalWf(updated);onUpdate(updated);};
  const flushWf=()=>onUpdate(localWf);

  const IS={fontFamily:"Manrope",fontSize:13,color:S.text,background:S.g50,border:`1.5px solid ${S.g200}`,borderRadius:8,padding:"8px 11px",outline:"none",width:"100%",boxSizing:"border-box"};
  const LS={fontFamily:"Manrope",fontSize:9,color:S.g400,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4,display:"block"};
  const F=({label,children})=><div style={{marginBottom:12}}><label style={LS}>{label}</label>{children}</div>;

  const ss=(i,s)=>{const a=[...localWf.steps];a[i]=s;const u={...localWf,steps:a};setLocalWf(u);onUpdate(u);};
  const ds=i=>{const u={...localWf,steps:localWf.steps.filter((_,j)=>j!==i)};setLocalWf(u);onUpdate(u);};
  const ms=(i,d)=>{const a=[...localWf.steps],j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];const u={...localWf,steps:a};setLocalWf(u);onUpdate(u);};
  const as=()=>{
    const s={id:newId(),icon_id:"flag",title:"Nova etapa",description:"",
      owner_type:"sirva_imigracao",responsible:"",role:"",start_date:"",end_date:"",
      status:"pending",tags:[],flow_type:localWf.flow_type||"relocation"};
    const u={...localWf,steps:[...localWf.steps,s]};
    setLocalWf(u);onUpdate(u);
  };

  const onTranslate=async(targetLang)=>{
    setShowTranslatePicker(false);setTranslating(true);

        <h3 style={{fontFamily:"Manrope",fontSize:14,color:S.text,fontWeight:800,margin:"0 0 14px"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
          <F label={t.service}><input style={IS} value={localWf.service||""} onChange={e=>siLocal("service",e.target.value)} onBlur={flushWf}/></F>
          <F label={t.client}><input style={IS} value={localWf.client||""} onChange={e=>siLocal("client",e.target.value)} onBlur={flushWf}/></F>
          <F label={"👤 "+t.expat}><input style={IS} value={localWf.expat_name||""} onChange={e=>siLocal("expat_name",e.target.value)} onBlur={flushWf} placeholder="Nome completo"/></F>

          <F label={t.email}><input style={IS} value={localWf.contact_email||""} onChange={e=>siLocal("contact_email",e.target.value)} onBlur={flushWf}/></F>
          <F label={t.startDate}><input type="date" style={IS} value={localWf.start_date||""} onChange={e=>siFlush("start_date",e.target.value)}/></F>
          <div style={{marginBottom:12}}>
            <label style={LS}>Acompanhado?</label>

        </div>

      {/* Steps header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
