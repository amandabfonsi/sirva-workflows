            <button onClick={()=>!translating&&setShowTranslatePicker(p=>!p)} disabled={translating}
              style={{background:S.light,color:S.primary,border:`1.5px solid ${S.mid}`,borderRadius:8,padding:"7px 12px",fontFamily:"Manrope",fontSize:12,fontWeight:700,cursor:translating?"wait":"pointer",display:"flex",alignItems:"center",gap:5}}>
              {translating?<><Spinner size={12}/>Traduzindo...</>:"🌐 Traduzir ▾"}
            </button>
            {showTranslatePicker&&(
              <div style={{position:"absolute",top:"100%",left:0,zIndex:200,marginTop:4,background:S.white,borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",border:`1px solid ${S.g200}`,overflow:"hidden",minWidth:140}}>
                {[["🇧🇷 Português","pt"],["🇺🇸 English","en"],["🇪🇸 Español","es"]].map(([label,code])=>(
                  <button key={code} onClick={()=>onTranslate(code)} style={{display:"block",width:"100%",border:"none",background:"transparent",padding:"10px 16px",fontFamily:"Manrope",fontSize:12,fontWeight:600,color:S.text,cursor:"pointer",textAlign:"left",borderBottom:`1px solid ${S.g100}`}}>
                    {label}
                  </button>
                ))}
              </div>
            )}
          </div>
          <button onClick={()=>{onUpdate(localWf);setTimeout(onSave,50);}} disabled={saving}
            style={{background:saveMsg?S.green:`linear-gradient(135deg,${S.accent},${S.accentDark})`,color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontFamily:"Manrope",fontSize:12,fontWeight:700,cursor:saving?"wait":"pointer",display:"flex",alignItems:"center",gap:7,transition:"all 0.3s"}}>
            {saving?<><Spinner size={12} color="#fff"/>{t.saving}</>:saveMsg||"💾 "+t.save}
          </button>
        </div>
      </div>

      {/* Step cards */}
      {localWf.steps.map((step,i)=>(
        <StepEditorCard key={step.id}
          step={step} index={i} total={localWf.steps.length}
          onUpdate={s=>ss(i,s)}
          onDelete={()=>ds(i)}
          onMoveUp={()=>ms(i,-1)}
          onMoveDown={()=>ms(i,1)}
          onPickIcon={()=>setShowPicker(i)}
          t={t} IS={IS} LS={LS} F={F}
        />
      ))}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function Dashboard({workflows, t}) {
  const today = new Date(); today.setHours(0,0,0,0);

  // ── Computed KPIs ────────────────────────────────────
  const allSteps = workflows.flatMap(wf => wf.steps.map(s => ({...s, wf})));
  const totalExpats    = workflows.length;
  const totalSteps     = allSteps.length;
  const completedSteps = allSteps.filter(s => s.status === "completed").length;
  const inProgressSteps= allSteps.filter(s => s.status === "in_progress").length;
  const lateSteps      = allSteps.filter(s =>
    s.status !== "completed" && s.end_date && new Date(s.end_date+"T00:00:00") < today
  );
  const completionRate = totalSteps > 0 ? Math.round((completedSteps/totalSteps)*100) : 0;

  // By flow type
  const byType = {relocation:0, immigration:0, moving:0, general:0};
  allSteps.forEach(s => { const k = s.flow_type||"relocation"; if(byType[k]!==undefined) byType[k]++; });

  // By client
  const byClient = {};
  workflows.forEach(wf => {
    if(!byClient[wf.client]) byClient[wf.client] = {total:0,done:0,late:0,name:wf.client};
    wf.steps.forEach(s => {
      byClient[wf.client].total++;
      if(s.status==="completed") byClient[wf.client].done++;
      if(s.status!=="completed" && s.end_date && new Date(s.end_date+"T00:00:00")<today) byClient[wf.client].late++;
    });
  });
  const clientList = Object.values(byClient).sort((a,b)=>b.total-a.total);

  // By month (based on start_date)
  const byMonth = {};
  workflows.forEach(wf => {
    if(wf.start_date) {
      const m = wf.start_date.slice(0,7);
      byMonth[m] = (byMonth[m]||0)+1;
    }
  });
  const months = Object.keys(byMonth).sort().slice(-6);

  // By owner (responsible)
  const lateByOwner = {};
  lateSteps.forEach(({step, wf}) => {
    const ow = getAllOwners()[step.owner_type]||DEFAULT_OWNERS.sirva_imigracao;
    if(!lateByOwner[ow.label]) lateByOwner[ow.label] = 0;
    lateByOwner[ow.label]++;
  });

  // ── Export to Excel ──────────────────────────────────
  const exportExcel = () => {
    const rows = [
      ["SIRVA — Dashboard Export", "", "", "", "", "", ""],
      ["Gerado em", new Date().toLocaleDateString("pt-BR"), "", "", "", "", ""],
      [],
      ["KPIs Gerais", "", "", "", "", "", ""],
      ["Total de Expatriados Ativos", totalExpats],
      ["Total de Etapas", totalSteps],
      ["Etapas Concluídas", completedSteps],
      ["Etapas Em Andamento", inProgressSteps],
      ["Etapas em Atraso", lateSteps.length],
      ["Taxa de Conclusão (%)", completionRate+"%"],
      [],
      ["Por Área", "Etapas"],
      ["Relocation", byType.relocation],
      ["Immigration", byType.immigration],
      ["Moving", byType.moving],
      ["Geral", byType.general],
      [],
      ["Por Cliente", "Total Etapas", "Concluídas", "Em Atraso", "% Conclusão"],
      ...clientList.map(c => [c.name, c.total, c.done, c.late,
        c.total>0?Math.round((c.done/c.total)*100)+"%":"0%"]),
      [],
      ["Etapas em Atraso — Detalhado", "", "", "", "", "", ""],
      ["Etapa", "Cliente", "Expatriado", "Responsável", "Prazo", "Dias de Atraso"],
      ...lateSteps.map(({step, wf}) => {
        const daysLate = Math.floor((today - new Date(step.end_date+"T00:00:00"))/86400000);
        const ow = getAllOwners()[step.owner_type]||DEFAULT_OWNERS.sirva_imigracao;
        return [step.title, wf.client, wf.expat_name||"—", ow.label, step.end_date, daysLate];
      }),
      [],
      ["Acompanhados vs Desacompanhados", "", "", "", ""],
      ["Acompanhado (Sim)", workflows.filter(w=>w.accompanied==="yes").length],
      ["Desacompanhado (Não)", workflows.filter(w=>w.accompanied!=="yes").length],
      [],
      ["Evolução Mensal", "Serviços iniciados"],
      ...months.map(m=>[m, byMonth[m]||0]),
      [],
      ["Tempo Médio por Área (dias)", ""],
      ...[["relocation","Relocation"],["immigration","Immigration"],["moving","Moving"],["general","Geral"]].map(([type,label])=>{
        const wfsOfType=workflows.filter(wf=>wf.steps.some(s=>(s.flow_type||"relocation")===type));
        if(!wfsOfType.length) return [label,"sem dados"];
        const durations=wfsOfType.map(wf=>{
          const st=wf.steps.filter(s=>(s.flow_type||"relocation")===type);
          const dates=st.flatMap(s=>[s.start_date,s.end_date]).filter(Boolean).sort();
          return dates.length>1?Math.round((new Date(dates[dates.length-1]+"T00:00:00")-new Date(dates[0]+"T00:00:00"))/86400000):null;
        }).filter(d=>d!==null);
        return [label, durations.length>0?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length)+" dias":"sem dados"];
      }),
    ];
    const csv = rows.map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `sirva-dashboard-${new Date().toISOString().split("T")[0]}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // ── Mini chart (SVG bars) ────────────────────────────
  const BarChart = ({data, colorFn, height=80}) => {
    const max = Math.max(...data.map(d=>d.value), 1);
    return (
      <div style={{display:"flex",alignItems:"flex-end",gap:6,height:height,paddingTop:8}}>
        {data.map((d,i) => (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <div style={{fontFamily:"Manrope",fontSize:9,fontWeight:700,color:S.sub}}>{d.value}</div>
            <div style={{width:"100%",borderRadius:"4px 4px 0 0",
              background:colorFn(d,i),
              height: `${Math.max((d.value/max)*100,4)}%`,
              transition:"height 0.6s ease",minHeight:4}}/>
            <div style={{fontFamily:"Manrope",fontSize:9,color:S.g400,textAlign:"center",
              lineHeight:1.2,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {d.label}
            </div>
          </div>
        ))}
      </div>
    );
  };

  const DonutChart = ({slices, size=120}) => {
    const total = slices.reduce((s,x)=>s+x.value,0)||1;
    let angle = -90;
    const cx=size/2, cy=size/2, r=size*0.38, ir=size*0.22;
    const paths = slices.map(s => {
      const pct = s.value/total;
      const a1 = angle * Math.PI/180;
      angle += pct*360;
      const a2 = angle * Math.PI/180;
      const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      const xi1=cx+ir*Math.cos(a1),yi1=cy+ir*Math.sin(a1);
      const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
      const large = pct>0.5?1:0;
      return {d:`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z`,
        fill:s.color, label:s.label, value:s.value, pct:Math.round(pct*100)};
    });
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {total===0
          ? <circle cx={cx} cy={cy} r={r} fill={S.g200}/>
          : paths.map((p,i)=><path key={i} d={p.d} fill={p.fill}/>)
        }
        <text x={cx} y={cy-6} textAnchor="middle" fontFamily="Manrope" fontSize="13" fontWeight="800" fill={S.text}>{total}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fontFamily="Manrope" fontSize="8" fill={S.sub}>total</text>
      </svg>
    );
  };

  const typeData = [
    {label:"Relocation",value:byType.relocation,color:"#150750"},
    {label:"Immigration",value:byType.immigration,color:"#7C3AED"},
    {label:"Moving",value:byType.moving,color:"#0D9488"},
    {label:"Geral",value:byType.general,color:"#475569"},
  ];

  const statusData = [
    {label:"Concluído",value:completedSteps,color:S.green},
    {label:"Em andamento",value:inProgressSteps,color:"#f59e0b"},
    {label:"Pendente",value:totalSteps-completedSteps-inProgressSteps,color:S.g400},
    {label:"Em atraso",value:lateSteps.length,color:"#ef4444"},
  ];

  const accompData = [
    {label:"Acompanhado",value:workflows.filter(w=>w.accompanied==="yes").length,color:S.green},
    {label:"Desacompanhado",value:workflows.filter(w=>w.accompanied!=="yes").length,color:S.g400},
  ];

  const Card = ({label,value,sub,color="#150750",bg="#F3EAF9",icon}) => (
    <div style={{background:S.white,borderRadius:14,padding:"18px 20px",
      border:`1.5px solid ${S.g200}`,boxShadow:"0 2px 10px rgba(13,4,53,0.05)",
      display:"flex",alignItems:"center",gap:14}}>
      <div style={{width:46,height:46,borderRadius:12,background:bg,flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
        {icon}
      </div>
      <div>
        <div style={{fontFamily:"Manrope",fontSize:26,fontWeight:800,color,lineHeight:1}}>{value}</div>
        <div style={{fontFamily:"Manrope",fontSize:12,fontWeight:700,color:S.text,marginTop:3}}>{label}</div>
        {sub&&<div style={{fontFamily:"Manrope",fontSize:10,color:S.g400,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );

  const Section = ({title,children}) => (
    <div style={{background:S.white,borderRadius:16,padding:"20px 22px",
      border:`1.5px solid ${S.g200}`,boxShadow:"0 2px 10px rgba(13,4,53,0.05)"}}>
      <div style={{fontFamily:"Manrope",fontSize:13,fontWeight:800,color:S.text,marginBottom:16,
        display:"flex",alignItems:"center",gap:8}}>
        {title}
      </div>
      {children}
    </div>
  );

  return (
    <div style={{padding:"20px",flex:1,overflow:"auto"}}>
      {/* Top bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"Manrope",fontSize:18,fontWeight:800,color:S.text}}>Dashboard</div>
          <div style={{fontFamily:"Manrope",fontSize:12,color:S.sub}}>
            Visão geral — {new Date().toLocaleDateString("pt-BR")}
          </div>
        </div>
        <button onClick={exportExcel}
          style={{background:`linear-gradient(135deg,${S.accent},${S.accentDark})`,
            color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",
            fontFamily:"Manrope",fontSize:13,fontWeight:700,cursor:"pointer",
            display:"flex",alignItems:"center",gap:8,boxShadow:`0 2px 12px ${S.accent}44`}}>
          📥 Exportar Excel
        </button>
      </div>

      {/* KPI Cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:20}}>
        <Card label="Expatriados Ativos"   value={totalExpats}        icon="👥" color={S.primary}   bg={S.light}/>
        <Card label="Taxa de Conclusão"    value={completionRate+"%"} icon="📊" color={S.green}    bg="#d1fae5" sub={`${completedSteps} de ${totalSteps} etapas`}/>
        <Card label="Em Andamento"         value={inProgressSteps}    icon="▶" color="#D97706"    bg="#fef3c7" sub="etapas"/>
        <Card label="Em Atraso"            value={lateSteps.length}   icon="⚠️" color="#DC2626"   bg="#fef2f2" sub="etapas"/>
        <Card label="Acompanhados"         value={workflows.filter(w=>w.accompanied==="yes").length} icon="👨‍👩‍👧" color={S.green} bg="#d1fae5"/>
      </div>

      {/* Charts row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14}}>
        {/* Donut: by type */}
        <Section title="📍 Por Área">
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <DonutChart slices={typeData} size={110}/>
            <div style={{flex:1}}>
              {typeData.map(d=>(
                <div key={d.label} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
                    <span style={{fontFamily:"Manrope",fontSize:11,color:S.text}}>{d.label}</span>
                  </div>
                  <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:800,color:d.color}}>
                    {d.value}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </Section>

        {/* Donut: by status */}
        <Section title="📋 Status das Etapas">
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <DonutChart slices={statusData} size={110}/>
            <div style={{flex:1}}>
              {statusData.map(d=>(
                <div key={d.label} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
                    <span style={{fontFamily:"Manrope",fontSize:11,color:S.text}}>{d.label}</span>
                  </div>
                  <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:800,color:d.color}}>
                    {d.value}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </Section>

        {/* Acompanhados */}
        <Section title="👨‍👩‍👧 Acompanhados">
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <DonutChart slices={accompData} size={110}/>
            <div style={{flex:1}}>
              {accompData.map(d=>(
                <div key={d.label} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
                    <span style={{fontFamily:"Manrope",fontSize:11,color:S.text}}>{d.label}</span>
                  </div>
                  <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:800,color:d.color}}>
                    {d.value}
                  </span>
                </div>
              ))}
              <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${S.g100}`}}>
                <div style={{fontFamily:"Manrope",fontSize:10,color:S.g400,marginBottom:4}}>Taxa de acompanhados</div>
                <div style={{fontFamily:"Manrope",fontSize:18,fontWeight:800,color:S.green}}>
                  {workflows.length>0?Math.round((workflows.filter(w=>w.accompanied==="yes").length/workflows.length)*100):0}%
                </div>
              </div>
            </div>
          </div>
        </Section>
      </div>

      {/* Line: monthly evolution */}
      {months.length > 0 && (
        <div style={{marginBottom:14}}>
          <Section title="📈 Evolução Mensal de Serviços">
            <div style={{position:"relative",height:120,display:"flex",alignItems:"flex-end",gap:8,padding:"8px 0 0"}}>
              {/* Y axis grid lines */}
              {[0,25,50,75,100].map(pct=>{
                const maxVal=Math.max(...months.map(m=>byMonth[m]||0),1);
                return(
                  <div key={pct} style={{position:"absolute",left:0,right:0,
                    bottom:`${pct}%`,borderTop:pct===0?"none":`1px dashed ${S.g100}`,
                    pointerEvents:"none"}}/>
                );
              })}
              {(() => {
                const maxVal=Math.max(...months.map(m=>byMonth[m]||0),1);
                return months.map((m,i)=>{
                  const val=byMonth[m]||0;
                  const h=Math.max((val/maxVal)*100,4);
                  const label=m.slice(5)+"/"+m.slice(2,4);
                  return(
                    <div key={m} style={{flex:1,display:"flex",flexDirection:"column",
                      alignItems:"center",gap:4,height:"100%",justifyContent:"flex-end"}}>
                      <div style={{fontFamily:"Manrope",fontSize:9,fontWeight:800,color:S.accent}}>{val}</div>
                      <div style={{width:"100%",maxWidth:40,borderRadius:"5px 5px 0 0",
                        background:`linear-gradient(to top,${S.accent},${S.accentDark}88)`,
                        height:`${h}%`,transition:"height 0.6s ease",minHeight:4,
                        boxShadow:`0 2px 8px ${S.accent}33`}}/>
                      <div style={{fontFamily:"Manrope",fontSize:9,color:S.g400}}>{label}</div>
                    </div>
                  );
                });
              })()}
            </div>
          </Section>
        </div>
      )}

      {/* Avg time by service type */}
      <div style={{marginBottom:14}}>
        <Section title="⏱ Tempo Médio por Tipo de Serviço">
          {(() => {
            const avgByType = {};
            ["relocation","immigration","moving","general"].forEach(type => {
              const wfsOfType = workflows.filter(wf =>
                wf.steps.some(s=>(s.flow_type||"relocation")===type)
              );
              if(wfsOfType.length === 0){ avgByType[type]=null; return; }
              const durations = wfsOfType.map(wf => {
                const stepsOfType = wf.steps.filter(s=>(s.flow_type||"relocation")===type);
                const dates = stepsOfType.flatMap(s=>[s.start_date,s.end_date]).filter(Boolean);
                if(dates.length < 2) return null;
                dates.sort();
                return Math.round((new Date(dates[dates.length-1]+"T00:00:00")-new Date(dates[0]+"T00:00:00"))/86400000);
              }).filter(d=>d!==null);
              avgByType[type] = durations.length>0 ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : null;
            });
            const typeLabels={relocation:{label:"Relocation",color:"#150750",bg:"#E8E4F7"},
              immigration:{label:"Immigration",color:"#7C3AED",bg:"#F5F3FF"},
              moving:{label:"Moving",color:"#0D9488",bg:"#F0FDFA"},
              general:{label:"Geral",color:"#475569",bg:"#F1F5F9"}};
            const maxDays = Math.max(...Object.values(avgByType).filter(Boolean),1);
            return(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
                {Object.entries(avgByType).map(([type,days])=>{
                  const cfg=typeLabels[type];
                  return(
                    <div key={type} style={{background:cfg.bg,borderRadius:12,padding:"14px 16px",
                      border:`1.5px solid ${cfg.color}22`}}>
                      <div style={{fontFamily:"Manrope",fontSize:10,fontWeight:700,
                        color:cfg.color,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>
                        {cfg.label}
                      </div>
                      <div style={{fontFamily:"Manrope",fontSize:28,fontWeight:800,color:cfg.color,lineHeight:1}}>
                        {days??"-"}
                      </div>
                      <div style={{fontFamily:"Manrope",fontSize:10,color:cfg.color,opacity:0.7,marginTop:3}}>
                        {days?"dias em média":"sem dados"}
                      </div>
                      {days&&(
                        <div style={{marginTop:8,height:4,background:`${cfg.color}22`,borderRadius:99,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.round((days/maxDays)*100)}%`,
                            background:cfg.color,borderRadius:99}}/>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </Section>
      </div>

      {/* Bar: by client */}
      {clientList.length>0&&(
        <div style={{marginBottom:14}}>
          <Section title="🏢 Por Cliente">
            <BarChart
              data={clientList.slice(0,8).map(c=>({
                label:c.name,
                value:c.total,
                done:c.done,
                late:c.late,
              }))}
              colorFn={(d)=>S.accent}
              height={100}
            />
            {/* Table */}
            <div style={{marginTop:16,overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"Manrope",fontSize:12}}>
                <thead>
                  <tr style={{background:S.g50}}>
                    {["Cliente","Expats","Etapas","Concluídas","Em Atraso","% Conclusão"].map(h=>(
                      <th key={h} style={{padding:"7px 12px",textAlign:"left",
                        fontFamily:"Manrope",fontSize:10,fontWeight:700,color:S.g400,
                        textTransform:"uppercase",letterSpacing:"0.05em",
                        borderBottom:`1px solid ${S.g200}`}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {clientList.map((c,i)=>{
                    const pct = c.total>0?Math.round((c.done/c.total)*100):0;
                    return(
                      <tr key={c.name} style={{background:i%2===0?"transparent":S.g50,
                        borderBottom:`1px solid ${S.g100}`}}>
                        <td style={{padding:"8px 12px",fontWeight:700,color:S.text}}>{c.name}</td>
                        <td style={{padding:"8px 12px",color:S.sub}}>
                          {workflows.filter(w=>w.client===c.name).length}
                        </td>
                        <td style={{padding:"8px 12px",color:S.sub}}>{c.total}</td>
                        <td style={{padding:"8px 12px",color:S.green,fontWeight:700}}>{c.done}</td>
                        <td style={{padding:"8px 12px"}}>
                          {c.late>0
                            ? <span style={{color:"#DC2626",fontWeight:700,background:"#fef2f2",
                                padding:"2px 8px",borderRadius:99}}>{c.late} ⚠</span>
                            : <span style={{color:S.g400}}>—</span>
                          }
                        </td>
                        <td style={{padding:"8px 12px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{flex:1,height:6,background:S.g100,borderRadius:99,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,
                                background:pct===100?S.green:pct>50?S.accent:"#f59e0b",
                                borderRadius:99,transition:"width 0.5s"}}/>
                            </div>
                            <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:700,
                              color:pct===100?S.green:S.text,minWidth:30}}>{pct}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Section>
        </div>
      )}

      {/* Late steps detail */}
      {lateSteps.length>0&&(
        <Section title={`⚠️ Etapas em Atraso (${lateSteps.length})`}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"Manrope",fontSize:12}}>
              <thead>
                <tr style={{background:S.g50}}>
                  {["Etapa","Cliente","Expatriado","Responsável","Prazo","Atraso"].map(h=>(
                    <th key={h} style={{padding:"7px 12px",textAlign:"left",
                      fontFamily:"Manrope",fontSize:10,fontWeight:700,color:S.g400,
                      textTransform:"uppercase",letterSpacing:"0.05em",
                      borderBottom:`1px solid ${S.g200}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {lateSteps.map(({step,wf},i)=>{
                  const daysLate = Math.floor((today-new Date(step.end_date+"T00:00:00"))/86400000);
                  const oc = ownerColor(step.owner_type);
                  return(
                    <tr key={step.id} style={{background:i%2===0?"transparent":"#fff8f8",
                      borderBottom:`1px solid ${S.g100}`}}>
                      <td style={{padding:"8px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:3,height:28,borderRadius:2,background:oc.bar,flexShrink:0}}/>
                          <span style={{fontWeight:700,color:S.text}}>{step.title}</span>
                        </div>
                      </td>
                      <td style={{padding:"8px 12px",color:S.sub}}>{wf.client}</td>
                      <td style={{padding:"8px 12px",color:S.sub}}>{wf.expat_name||"—"}</td>
                      <td style={{padding:"8px 12px"}}>
                        <span style={{fontFamily:"Manrope",fontSize:10,fontWeight:700,
                          color:oc.text,background:oc.light,padding:"2px 7px",borderRadius:99}}>
                          {(getAllOwners()[step.owner_type]||DEFAULT_OWNERS.sirva_imigracao).label}
                        </span>
                      </td>
                      <td style={{padding:"8px 12px",color:"#DC2626",fontWeight:600}}>{step.end_date}</td>
                      <td style={{padding:"8px 12px"}}>
                        <span style={{background:"#fef2f2",color:"#DC2626",fontWeight:800,
                          padding:"3px 10px",borderRadius:99,fontFamily:"Manrope",fontSize:11}}>
                          {daysLate}d
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Section>
      )}

      {workflows.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:S.g400,fontFamily:"Manrope"}}>
          <div style={{fontSize:48,marginBottom:12}}>📊</div>
          <div style={{fontSize:14,fontWeight:700}}>Nenhum dado ainda</div>
          <div style={{fontSize:12,marginTop:4}}>Crie seu primeiro fluxo para ver o dashboard</div>
        </div>
      )}
    </div>
  );
}
/* ═══════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════ */
function Sidebar({workflows,activeId,onSelect,onNewClient,onNewExpat,t,collapsed,onToggle}){
  const[search,setSearch]=useState("");
  const[openClients,setOpenClients]=useState({});

  // Filter workflows by search
  const filteredWfs=useMemo(()=>{
    if(!search.trim())return workflows;
    const q=search.toLowerCase();
    return workflows.filter(wf=>
      (wf.client||"").toLowerCase().includes(q)||
      (wf.expat_name||"").toLowerCase().includes(q)
    );
  },[workflows,search]);

  // Group by client
  const byClient=useMemo(()=>{
    const map={};
    filteredWfs.forEach(wf=>{
      const k=wf.client||"(sem cliente)";
      if(!map[k])map[k]=[];
      map[k].push(wf);
    });
    return map;
  },[filteredWfs]);

  // Toggle open/closed per client
  const toggleClient=k=>setOpenClients(s=>({...s,[k]:!s[k]}));
  // A client folder is open if: manually opened OR has active item OR search is active
  const isOpen=(clientName,wfs)=>{
    if(search.trim()) return true; // always open when searching
    if(openClients[clientName]===false) return false; // manually closed
    if(openClients[clientName]===true) return true;   // manually opened
    return wfs.some(w=>w.id===activeId);              // open if has active
  };

  if(collapsed){
    return(
      <div style={{width:48,background:S.dark,display:"flex",flexDirection:"column",
        alignItems:"center",paddingTop:16,gap:8,flexShrink:0}}>
        <button onClick={onToggle} style={{border:"none",background:"rgba(255,255,255,0.08)",
          borderRadius:8,width:32,height:32,cursor:"pointer",color:"rgba(255,255,255,0.5)",
          fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>☰</button>
      </div>
    );
  }

  return(
    <div style={{width:240,background:S.dark,display:"flex",flexDirection:"column",flexShrink:0,
      borderRight:`1px solid rgba(255,255,255,0.06)`}}>
      {/* Sidebar header */}
      <div style={{padding:"14px 16px 10px",display:"flex",alignItems:"center",
        justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:700,
          color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{t.clients}</span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={onNewClient} title={t.newClient}
            style={{border:"none",background:"rgba(166,77,214,0.3)",borderRadius:6,
              width:24,height:24,cursor:"pointer",color:S.accent,fontSize:16,
              display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>+</button>
          <button onClick={onToggle} style={{border:"none",background:"rgba(255,255,255,0.06)",
            borderRadius:6,width:24,height:24,cursor:"pointer",color:"rgba(255,255,255,0.3)",
            fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        </div>
      </div>

      {/* Search bar */}
      <div style={{padding:"8px 12px 4px"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",
            fontSize:13,opacity:0.4}}>🔍</span>
          <input
            value={search}
            onChange={e=>setSearch(e.target.value)}
            placeholder="Buscar cliente ou expat..."
            style={{width:"100%",boxSizing:"border-box",
              fontFamily:"Manrope",fontSize:11,color:"rgba(255,255,255,0.8)",
              background:"rgba(255,255,255,0.07)",
              border:"1px solid rgba(255,255,255,0.1)",
              borderRadius:8,padding:"7px 10px 7px 28px",outline:"none"}}
          />
          {search&&(
            <button onClick={()=>setSearch("")} style={{position:"absolute",right:8,
              top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",
              color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:13,padding:0,
              lineHeight:1}}>✕</button>
          )}
        </div>
      </div>

      {/* Client tree */}
      <div style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
        {Object.keys(byClient).length===0&&(
          <div style={{fontFamily:"Manrope",fontSize:12,color:"rgba(255,255,255,0.3)",
            padding:"16px",textAlign:"center"}}>{t.noClient}</div>
        )}
        {Object.entries(byClient).map(([clientName,wfs])=>(
          <div key={clientName}>
            {/* Client folder */}
            <div onClick={()=>toggleClient(clientName)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px",
                cursor:"pointer",userSelect:"none",
                background:wfs.some(w=>w.id===activeId)?"rgba(166,77,214,0.12)":"transparent",
                transition:"background 0.15s"}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",
                transition:"transform 0.2s",
                display:"inline-block",
                transform:isOpen(clientName,wfs)?"rotate(0deg)":"rotate(-90deg)",transition:"transform 0.2s"}}>
                ▾</span>
              <span style={{fontSize:13}}>🏢</span>
              <span style={{fontFamily:"Manrope",fontSize:12,fontWeight:700,
                color:wfs.some(w=>w.id===activeId)?S.accent:"rgba(255,255,255,0.7)",
                flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {clientName}</span>
              <span style={{fontFamily:"Manrope",fontSize:9,color:"rgba(255,255,255,0.25)",
                background:"rgba(255,255,255,0.07)",borderRadius:99,padding:"1px 6px",
                flexShrink:0}}>{wfs.length}</span>
              <button onClick={e=>{e.stopPropagation();onNewExpat(clientName);}}
                title={t.newExpat}
                style={{border:"none",background:"transparent",cursor:"pointer",
                  color:"rgba(255,255,255,0.3)",fontSize:14,padding:"0 2px",
                  opacity:0,transition:"opacity 0.15s"}}
                className="add-expat-btn">+</button>
            </div>
            {/* Expat subfolders */}
            {isOpen(clientName,wfs)&&wfs.map(wf=>(
              <div key={wf.id} onClick={()=>onSelect(wf.id)}
                style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px 6px 36px",
                  cursor:"pointer",userSelect:"none",
                  background:wf.id===activeId?`rgba(166,77,214,0.2)`:"transparent",
                  borderLeft:wf.id===activeId?`2px solid ${S.accent}`:"2px solid transparent"}}>
                <span style={{fontSize:12}}>👤</span>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"Manrope",fontSize:11,fontWeight:700,
                    color:wf.id===activeId?S.accent:"rgba(255,255,255,0.6)",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {wf.expat_name||"(sem expat)"}
                  </div>
                  {wf.start_date&&<div style={{fontFamily:"Manrope",fontSize:9,
                    color:"rgba(255,255,255,0.3)"}}>{wf.start_date}</div>}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
function App(){
  const[phase,setPhase]=useState("loading"); // loading|setup|login|app
  const[lang,setLang]=useState("pt");
  const[fbCfg,setFbCfg]=useState(null);
  const[user,setUser]=useState(null);
  const[userRecord,setUserRecord]=useState(null);
  const[workflows,setWorkflows]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[tab,setTab]=useState("gantt");
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState("");
  const[loadingData,setLoadingData]=useState(false);
  const[toast,setToast]=useState(null);
  const[showAdmin,setShowAdmin]=useState(false);
  const[sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const[newWfModal,setNewWfModal]=useState(null);
  const[lateItems,setLateItems]=useState([]);
  const[showNotifPanel,setShowNotifPanel]=useState(false);
  const[showEmailSetup,setShowEmailSetup]=useState(false); // null | {defaultClient:""}

  const t=T[lang];

  const showToast=(msg,type="success")=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3500);
  };

  // Init: check for saved Firebase config
  useEffect(()=>{
    const saved=localStorage.getItem("sirva_fb_cfg");
    if(saved){
      try{
        const cfg=JSON.parse(saved);
        initFirebase(cfg).then(()=>{
          setFbCfg(cfg);
          // Listen to auth state
          fbAuth.onAuthStateChanged(async fbUser=>{
            if(fbUser){
              const users=await loadUsers();
              const found=(users||[]).find(u=>u.email===fbUser.email);
              if(found&&found.active!=="false"){
                setUser(fbUser);setUserRecord(found);setPhase("app");
              } else {
                setPhase("login");
              }
            } else {
              setPhase("login");
            }
          });
        }).catch(()=>setPhase("setup"));
      }catch{setPhase("setup");}
    } else {
      setPhase("setup");
    }
  },[]);

  // Load data when entering app
  useEffect(()=>{
    if(phase!=="app"||!userRecord)return;
    setLoadingData(true);
    loadData(userRecord.email,userRecord.role,userRecord.client_id)
      .then(data=>{
        const wfs=data||[];
        setWorkflows(wfs);
        if(wfs.length>0)setActiveId(wfs[0].id);
        setLoadingData(false);
        // Check for late steps once data is loaded
        if(userRecord && shouldNotifyToday(userRecord.email)){
          const late = getLateSteps(wfs);
          if(late.length > 0){
            // Filter to steps where this user is the consultant
            const myLate = late.filter(({wf}) =>
              !userRecord.email ||
              (wf.contact_email||"").toLowerCase() === userRecord.email.toLowerCase()
            );
            const toShow = myLate.length > 0 ? myLate : (userRecord.role==="admin"?late:[]);
            if(toShow.length > 0){
              setLateItems(toShow);
              setShowNotifPanel(true);
              setLastNotifDate(userRecord.email);
              // Send email
              if(emailjsConfigured()){
                sendLateEmail(userRecord.email, userRecord.name||userRecord.email, toShow);
              }
            }
          }
        }
      })
      .catch(e=>{showToast("Erro ao carregar: "+e.message,"error");setLoadingData(false);});
  },[phase,userRecord]);

  const wf=workflows.find(w=>w.id===activeId)||null;
  const updateWf=useCallback(updated=>setWorkflows(ws=>ws.map(w=>w.id===activeId?updated:w)),[activeId]);

  const save=async()=>{
    if(!wf)return;
    setSaving(true);
    try{
      await saveWorkflow(wf,(user&&user.email)||"");
      setSaveMsg(t.saved);setTimeout(()=>setSaveMsg(""),2500);
      showToast(t.saved);
    }catch(e){showToast("Erro: "+e.message,"error");}
    setSaving(false);
  };

  const handleNewWf=(clientName,expatName)=>{
    const id=newId();
    const nw={id,service:"Transferência Internacional — Pacote Executivo",
      client:clientName,expat_name:expatName,hr_name:"",consultant:"",
      contact_email:"",start_date:"",extra_weeks:0,uploaded_image:"",
      flow_type:"relocation",accompanied:"no",
      steps:DEFAULT_STEPS.map(s=>({...s,id:newId(),flow_type:"relocation"}))};
    setWorkflows(ws=>[...ws,nw]);
    setActiveId(id);setTab("gantt");setNewWfModal(null);
  };

  const handleLogout=async()=>{
    await signOut();
    setUser(null);setUserRecord(null);setWorkflows([]);setActiveId(null);
    setPhase("login");
  };

  const canEdit=userRecord&&(userRecord.role==="admin"||userRecord.role==="internal");
  const isAdmin=userRecord&&userRecord.role==="admin";

  const[flowFilter,setFlowFilter]=useState("all");
  const FLOW_FILTERS=[
    {id:"all",      label:"🗂 Geral"},
    {id:"relocation",label:"✈ Relocation"},
    {id:"immigration",label:"🌐 Immigration"},
    {id:"moving",   label:"📦 Moving"},
  ];

  const TABS=[
    {id:"gantt",label:"📊 "+t.gantt},
    ...(canEdit?[{id:"editor",label:"⚙️ "+t.editor}]:[]),
    ...(canEdit?[{id:"dashboard",label:"📈 Dashboard"}]:[]),
  ];

  if(phase==="loading") return(
    <div style={{minHeight:"100vh",background:S.dark,display:"flex",alignItems:"center",
      justifyContent:"center",flexDirection:"column",gap:14}}>
      <LogoW h={40}/>
      <Spinner size={28} color={S.accent}/>
    </div>
  );
  if(phase==="setup") return <SetupScreen onDone={cfg=>{setFbCfg(cfg);setPhase("login");}} lang={lang}/>;
  if(phase==="login") return <LoginScreen onLogin={(fbUser,rec)=>{setUser(fbUser);setUserRecord(rec);setPhase("app");}} lang={lang} setLang={setLang}/>;

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Manrope"}}>
      <style>{`.add-expat-btn{opacity:0!important}.add-expat-btn:hover,.add-expat-btn:focus{opacity:1!important}div:hover>.add-expat-btn{opacity:0.5!important}`}</style>
      {showAdmin&&<AdminPanel workflows={workflows} onClose={()=>setShowAdmin(false)} t={t}/>}
      {newWfModal!==null&&<NewWfModal onDone={handleNewWf} onClose={()=>setNewWfModal(null)} t={t} defaultClient={newWfModal.defaultClient||""}/>}

      {/* TOP BAR */}
      <div style={{background:S.dark,height:52,display:"flex",alignItems:"center",
        padding:"0 16px",gap:8,flexShrink:0,
        boxShadow:"0 2px 12px rgba(13,4,53,0.3)",zIndex:10}}>
        <LogoW h={26}/>
        <div style={{width:1,height:20,background:"rgba(255,255,255,0.15)",marginLeft:4}}/>
        <span style={{fontFamily:"Manrope",fontSize:11,fontWeight:700,
          color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em",marginRight:8}}>Workflows</span>

        {/* View tabs */}
        {wf&&TABS.map(tb=>(
          <button key={tb.id} onClick={()=>setTab(tb.id)} style={{border:"none",background:"none",
            cursor:"pointer",fontFamily:"Manrope",fontSize:12,fontWeight:700,
            color:tab===tb.id?S.accent:"rgba(255,255,255,0.35)",
            padding:"16px 10px",borderBottom:tab===tb.id?`2px solid ${S.accent}`:"2px solid transparent",
            transition:"all 0.15s",marginBottom:-1}}>{tb.label}</button>
        ))}

        {/* Right */}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {/* Lang */}
          {["pt","en","es"].map(l=>(
            <button key={l} onClick={()=>setLang(l)} style={{border:"none",
              background:lang===l?"rgba(166,77,214,0.3)":"transparent",
              color:lang===l?S.accent:"rgba(255,255,255,0.35)",
              borderRadius:99,padding:"3px 8px",cursor:"pointer",
              fontFamily:"Manrope",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>
              {l}
            </button>
          ))}
          {/* Notification bell */}
          <NotifBell count={lateItems.length} onClick={()=>setShowNotifPanel(true)}/>

          {/* Admin */}
          {isAdmin&&(
            <button onClick={()=>setShowAdmin(true)} style={{background:"rgba(255,255,255,0.08)",
              border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 11px",
              cursor:"pointer",color:"rgba(255,255,255,0.55)",fontFamily:"Manrope",fontSize:11,fontWeight:600}}>
              👥 {t.admin}
            </button>
          )}
          {/* Email setup (admin only) */}
          {isAdmin&&(
            <button onClick={()=>setShowEmailSetup(true)} title="Configurar notificações por e-mail"
              style={{background:emailjsConfigured()?"rgba(5,150,105,0.2)":"rgba(255,255,255,0.08)",
                border:`1px solid ${emailjsConfigured()?"rgba(5,150,105,0.4)":"rgba(255,255,255,0.1)"}`,
                borderRadius:8,padding:"5px 10px",cursor:"pointer",
                color:emailjsConfigured()?"#6ee7b7":"rgba(255,255,255,0.45)",fontSize:14}}>
              📧
            </button>
          )}
          {/* User */}
          <div style={{display:"flex",alignItems:"center",gap:7,
            background:"rgba(255,255,255,0.07)",borderRadius:99,padding:"4px 10px 4px 5px"}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:S.accent,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontFamily:"Manrope",fontSize:11,fontWeight:800,color:"#fff"}}>
              {((user&&user.email)||"U")[0].toUpperCase()}
            </div>
            <span style={{fontFamily:"Manrope",fontSize:11,color:"rgba(255,255,255,0.55)"}}>
              {(user&&user.email&&user.email.split("@")[0])||"user"}
            </span>
            <button onClick={handleLogout} style={{border:"none",background:"transparent",
              cursor:"pointer",color:"rgba(255,255,255,0.25)",fontSize:12,padding:"0 2px"}}>✕</button>
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Sidebar */}
        <Sidebar
          workflows={workflows}
          activeId={activeId}
          onSelect={id=>{setActiveId(id);setTab("gantt");}}
          onNewClient={()=>setNewWfModal({defaultClient:""})}
          onNewExpat={clientName=>setNewWfModal({defaultClient:clientName})}
          t={t}
          collapsed={sidebarCollapsed}
          onToggle={()=>setSidebarCollapsed(!sidebarCollapsed)}
        />

        {/* Main content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"auto",background:S.g50}}>
          {loadingData?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",
              height:"60%",flexDirection:"column",gap:14}}>
              <Spinner size={28}/>
              <span style={{fontFamily:"Manrope",fontSize:13,color:S.sub}}>Carregando...</span>
            </div>
          ):!wf?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",
              height:"60%",flexDirection:"column",gap:16}}>
              <div style={{fontSize:48}}>📂</div>
              <div style={{fontFamily:"Manrope",fontSize:14,color:S.sub}}>{t.selectClient}</div>
              {canEdit&&(
                <button onClick={()=>setNewWfModal({defaultClient:""})}
                  style={{background:`linear-gradient(135deg,${S.accent},${S.accentDark})`,
                    color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",
                    fontFamily:"Manrope",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  {t.newClient}
                </button>
              )}
            </div>
          ):(
            <>
              {tab==="gantt"&&<GanttView wf={wf} onUpdate={updateWf} onSave={save}
                saving={saving} saveMsg={saveMsg} t={t} canEdit={canEdit}
                flowFilter={flowFilter} setFlowFilter={setFlowFilter} flowFilters={FLOW_FILTERS}/>}
              {tab==="editor"&&canEdit&&<EditorView wf={wf} onUpdate={updateWf} onSave={save}
                saving={saving} saveMsg={saveMsg} t={t} lang={lang}/>}
            </>
          )}
        </div>
      </div>
      {tab==="dashboard"&&canEdit&&(
        <div style={{position:"fixed",top:48,left:sidebarCollapsed?40:230,right:0,bottom:0,
          overflowY:"auto",background:S.g50,display:"flex",flexDirection:"column"}}>
          <Dashboard workflows={workflows} t={t}/>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      {showNotifPanel&&<NotificationPanel lateItems={lateItems} onClose={()=>setShowNotifPanel(false)} t={t}/>}
      {showEmailSetup&&<EmailJsSetup onClose={()=>setShowEmailSetup(false)} onSave={()=>showToast("E-mail configurado! ✓")}/>}
    </div>
  );
}

const loader=document.getElementById("initial-loader");
if(loader)loader.style.display="none";
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
